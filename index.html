PE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#2E8C63"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="경기케어 메뉴"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>경기케어 일일 메뉴</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --g1:#2E8C63;--g2:#3DAA7A;--g3:#55C896;
  --mint:#E8F7F1;--bg:#F2F7F5;
  --t1:#2C3E35;--t2:#7A9088;--t3:#C5D8D0;--t4:#EDF4F1;
  --sat: env(safe-area-inset-top);
  --sab: env(safe-area-inset-bottom);
  --sal: env(safe-area-inset-left);
  --sar: env(safe-area-inset-right);
}
html{height:100%;overflow:hidden}
body{
  font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
  background:var(--bg);
  min-height:100%;
  height:100%;
  overflow-y:auto;
  overscroll-behavior-y:none;
  -webkit-overflow-scrolling:touch;
  -webkit-font-smoothing:antialiased;
  padding-top:var(--sat);
  padding-bottom:var(--sab);
  padding-left:var(--sal);
  padding-right:var(--sar);
}
button,input{touch-action:manipulation;-webkit-appearance:none;user-select:none}
textarea{font-size:16px!important;-webkit-overflow-scrolling:touch}

/* HEADER */
.hdr{background:linear-gradient(145deg,var(--g1),var(--g2),var(--g3));padding:18px 20px 44px;text-align:center;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:32px;background:var(--bg);border-radius:40px 40px 0 0}
.hdr-bubble{position:absolute;border-radius:50%;background:rgba(255,255,255,.08)}
.hdr-bubble.a{width:260px;height:260px;top:-80px;left:-60px}
.hdr-bubble.b{width:180px;height:180px;top:10px;right:-50px}
.brand{display:inline-block;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.35);color:#fff;font-size:.65rem;font-weight:800;padding:3px 12px;border-radius:20px;letter-spacing:.1em;margin-bottom:8px;position:relative;z-index:1}
.hdr h1{font-size:2rem;font-weight:900;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.15);position:relative;z-index:1;line-height:1.2}
.hdr h1 small{display:block;font-size:1rem;font-weight:700;opacity:.9;margin-top:4px;letter-spacing:.04em;padding-left:2.2rem}
.today-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 18px;border-radius:20px;font-size:.82rem;font-weight:600;margin-top:14px;position:relative;z-index:1}

/* MAIN */
.main{padding:12px 16px calc(90px + var(--sab))}
.empty{background:#fff;border-radius:24px;padding:50px 24px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.05);margin-top:6px}
.empty .ei{font-size:3.2rem;margin-bottom:14px}
.empty p{color:var(--t2);font-size:.9rem;line-height:1.7}

/* DATE CARDS */
.cards{display:flex;flex-direction:column;gap:12px}
.dcard{background:#fff;border-radius:22px;padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 3px 16px rgba(0,0,0,.06);cursor:pointer;border:2px solid transparent;opacity:0;transform:translateY(20px);transition:transform .12s}
.dcard:active{transform:scale(.97)!important}
.dcard.today{background:linear-gradient(135deg,var(--g1),var(--g2));box-shadow:0 6px 24px rgba(61,170,122,.38)}
.dcard.today .dc-mo,.dcard.today .dc-n,.dcard.today .dc-wd,.dcard.today .dc-ar,.dcard.today .tag{color:#fff!important}
.dcard.today .badge{background:rgba(255,255,255,.28);color:#fff}
.dcard.today .div{background:rgba(255,255,255,.3)}
.dc-nb{display:flex;flex-direction:column;align-items:center;min-width:52px;flex-shrink:0}
.dc-mo{font-size:.62rem;font-weight:800;color:var(--g1);letter-spacing:.04em}
.dc-n{font-size:2.8rem;font-weight:900;line-height:1;color:var(--t1);letter-spacing:-2px}
.dc-wd{font-size:.62rem;font-weight:600;color:var(--t2);margin-top:2px}
.div{width:1px;background:var(--t3);flex-shrink:0;align-self:stretch;margin:2px 0}
.dc-r{flex:1;display:flex;flex-direction:column;gap:5px;min-width:0;padding-right:18px}
.tag{display:none;font-size:.6rem;font-weight:800;color:#fff;background:rgba(255,255,255,.28);padding:2px 8px;border-radius:9px;width:fit-content}
.dcard.today .tag{display:block}
.dc-meal-row{display:flex;align-items:baseline;gap:5px;min-width:0}
.dc-meal-ic{font-size:.72rem;flex-shrink:0}
.dc-meal-nm{font-size:.68rem;font-weight:600;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dcard.today .dc-meal-nm{color:rgba(255,255,255,.85)}
.dcard.today .dc-n,.dcard.today .dc-mo,.dcard.today .dc-wd{color:#fff}
.dc-ar{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:1.2rem;color:var(--t3)}
.dcard{position:relative;padding:14px 16px}

/* ADMIN FAB */
.admin-fab{position:fixed;bottom:calc(18px + var(--sab));right:calc(16px + var(--sar));z-index:50}
.admin-fab button{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--t3);border-radius:20px;color:var(--t2);font-size:.65rem;font-weight:700;cursor:pointer;padding:10px 16px;min-height:44px;box-shadow:0 2px 10px rgba(0,0,0,.1)}

/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(20,40,32,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.ov.center{align-items:center;justify-content:center}

/* MEAL SHEET */
.sheet{background:#fff;border-radius:28px 28px 0 0;padding:10px 16px calc(28px + var(--sab));width:100%;max-width:520px;transform:translateY(100%);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.handle{width:32px;height:4px;border-radius:2px;background:var(--t3);margin:0 auto 14px}
.sh-top{display:flex;align-items:flex-end;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1.5px solid var(--t4)}
.sh-num{font-size:3.4rem;font-weight:900;line-height:1;color:var(--g1);letter-spacing:-2px;flex-shrink:0}
.sh-info{padding-bottom:4px}
.sh-mo{font-size:.72rem;font-weight:800;color:var(--g2)}
.sh-wd{font-size:.95rem;font-weight:800;color:var(--t1);margin-top:2px}
.sh-hint{font-size:.72rem;color:var(--t2);margin-top:3px}

/* MEAL BUTTONS */
.meal-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.mbtn{background:var(--t4);border:2.5px solid transparent;border-radius:16px;padding:13px 8px;text-align:center;cursor:pointer;transition:all .2s}
.mbtn.active{border-color:var(--g2);background:var(--mint)}
.mbtn:active{transform:scale(.94)}
.mbtn-icon{font-size:1.7rem;display:block;margin-bottom:5px}
.mbtn-lbl{font-size:.78rem;font-weight:700;color:var(--t1)}
.mbtn.active .mbtn-lbl{color:var(--g1)}

/* MENU LIST */
.mlist{display:none}
.mlist.on{display:block}
.mlist-ttl{font-size:.74rem;font-weight:800;color:var(--g1);padding-bottom:7px;margin-bottom:9px;border-bottom:1.5px solid var(--mint)}
#mlistBody{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.mitem{display:flex;align-items:center;gap:7px;background:var(--t4);border-radius:11px;padding:9px 10px}
.mitem-em{font-size:1.3rem;flex-shrink:0}
.mitem-nm{font-size:.82rem;font-weight:600;color:var(--t1)}
.mlist-none{text-align:center;padding:24px;color:var(--t2);font-size:.88rem}

/* PASSWORD MODAL */
.pw-box{background:#fff;border-radius:24px;padding:26px 20px 20px;width:84%;max-width:280px;text-align:center}
.pw-lock{font-size:2.2rem;margin-bottom:10px}
.pw-title{font-size:1rem;font-weight:800;color:var(--t1);margin-bottom:3px}
.pw-sub{font-size:.74rem;color:var(--t2);margin-bottom:16px}
.pw-dots{display:flex;justify-content:center;gap:11px;margin-bottom:6px}
.dot{width:12px;height:12px;border-radius:50%;background:#eee;transition:background .15s,transform .15s}
.dot.on{background:var(--g2);transform:scale(1.2)}
.pw-err{font-size:.72rem;color:#ef4444;min-height:16px;margin-bottom:10px}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.npbtn{background:var(--t4);border:none;border-radius:12px;padding:14px 8px;font-size:1.05rem;font-weight:700;color:var(--t1);cursor:pointer;transition:all .1s;min-height:50px}
.npbtn:active{background:var(--g2);color:#fff;transform:scale(.92)}
.npbtn.del{background:#fee2e2;color:#ef4444}
.npbtn.emp{background:transparent;pointer-events:none}
.pw-cancel{background:var(--t4);border:none;border-radius:12px;padding:12px;width:100%;font-size:.88rem;font-weight:600;color:var(--t2);cursor:pointer}

/* ADMIN PANEL */
.admin-panel{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.admin-panel.on{display:block}
.ap-inner{max-width:520px;margin:0 auto;padding:calc(16px + var(--sat)) 16px calc(60px + var(--sab))}
.ap-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;padding-top:8px}
.ap-head h2{font-size:1.2rem;font-weight:800;color:var(--t1)}
.ap-close{width:34px;height:34px;border-radius:50%;background:var(--t3);border:none;font-size:.9rem;font-weight:700;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.sec-lbl{font-size:.7rem;font-weight:800;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.upload-box{background:#fff;border:2px dashed var(--t3);border-radius:20px;padding:34px 20px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:14px}
.upload-box:hover{border-color:var(--g2)}
.ub-icon{font-size:2.4rem;margin-bottom:8px}
.ub-lbl{color:var(--t2);font-size:.9rem}
.ub-hint{color:var(--t3);font-size:.72rem;margin-top:4px}
#pdfInput{display:none}
.status-bar{border-radius:14px;padding:12px 16px;font-size:.83rem;font-weight:600;margin-bottom:12px;display:none;line-height:1.5}
.status-bar.show{display:block}
.status-bar.ok{background:#d1fae5;color:#065f46}
.status-bar.err{background:#fee2e2;color:#991b1b}
.status-bar.info{background:#eff6ff;color:#1d4ed8}
.raw-hint{font-size:.75rem;color:var(--t2);margin-bottom:7px;line-height:1.55}
.raw-area{width:100%;background:#fff;border:1px solid var(--t3);border-radius:14px;padding:13px 15px;font-size:.78rem;font-family:monospace;color:var(--t1);min-height:160px;resize:vertical;outline:none;line-height:1.65;margin-bottom:12px}
.raw-area:focus{border-color:var(--g2)}
.prev-box{background:#fff;border-radius:18px;padding:16px;margin-bottom:14px;display:none;border:1.5px solid var(--t3)}
.prev-box.show{display:block}
.pv-dt{font-size:.86rem;font-weight:800;color:var(--t1);padding-bottom:7px;margin-bottom:7px;border-bottom:1px solid var(--t4)}
.pv-row{display:flex;gap:8px;margin-bottom:5px;align-items:flex-start}
.pv-tag{font-size:.73rem;font-weight:700;color:var(--g1);min-width:40px;flex-shrink:0;padding-top:1px}
.pv-items{font-size:.77rem;color:var(--t2);line-height:1.6}
.home-btn{width:100%;margin-top:20px;padding:13px;border:none;border-radius:14px;background:var(--t4);color:var(--t2);font-size:.9rem;font-weight:700;cursor:pointer;}
.home-btn:active{opacity:.7}
.abtn{width:100%;padding:14px;border:none;border-radius:14px;font-size:.93rem;font-weight:700;cursor:pointer;margin-bottom:8px;transition:opacity .15s}
.abtn:active{opacity:.88}
.abtn.pri{background:linear-gradient(135deg,var(--g1),var(--g3));color:#fff;box-shadow:0 4px 14px rgba(61,170,122,.32)}
.abtn.sec{background:var(--t4);color:var(--t2)}
.abtn.dan{background:#fee2e2;color:#ef4444}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(29,78,216,.25);border-top-color:#1d4ed8;border-radius:50%;animation:rot .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes rot{to{transform:rotate(360deg)}}

/* SAVE POPUP */
.sp-wrap{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:99999;display:flex;align-items:center;justify-content:center}
.sp-box{background:#fff;border-radius:26px;padding:34px 26px 24px;width:82%;max-width:280px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.22);animation:spIn .3s ease}
@keyframes spIn{from{transform:scale(.75);opacity:0}to{transform:scale(1);opacity:1}}
.sp-icon{font-size:3rem;margin-bottom:10px;display:block}
.sp-ttl{font-size:1.05rem;font-weight:900;color:var(--t1);margin-bottom:8px}
.sp-msg{font-size:.83rem;color:var(--t2);line-height:1.65;margin-bottom:22px;white-space:pre-line}
.sp-btn{width:100%;padding:13px;border:none;border-radius:14px;font-size:.93rem;font-weight:700;color:#fff;cursor:pointer}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr" id="appHdr">
  <div class="hdr-bubble a"></div>
  <div class="hdr-bubble b"></div>
  <div class="brand">GYEONGGI CARE</div>
  <h1>🍱 경기케어<small>일 일 메 뉴</small></h1>
  <div class="today-chip" id="todayChip">📅 로딩 중…</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="empty" id="emptyCard">
    <div class="ei">🥡</div>
    <p>아직 등록된 메뉴가 없습니다.<br>우측 하단 <b>🔒 관리자</b> 버튼을 눌러<br>PDF를 업로드해주세요.</p>
  </div>
  <div class="cards" id="cards"></div>
</div>

<!-- ADMIN FAB -->
<div class="admin-fab">
  <button onclick="openPw()">🔒 관리자</button>
</div>

<!-- MEAL SHEET -->
<div class="ov" id="mealOv" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet">
    <div class="handle"></div>
    <div class="sh-top">
      <div class="sh-num" id="shNum">10</div>
      <div class="sh-info">
        <div class="sh-mo" id="shMo">4월</div>
        <div class="sh-wd" id="shWd">월요일</div>
        <div class="sh-hint">식사 시간을 선택하세요</div>
      </div>
    </div>
    <div class="meal-grid">
      <div class="mbtn" onclick="pickMeal('아침',this)"><span class="mbtn-icon">🌅</span><span class="mbtn-lbl">아침</span></div>
      <div class="mbtn" onclick="pickMeal('점심',this)"><span class="mbtn-icon">☀️</span><span class="mbtn-lbl">점심</span></div>
      <div class="mbtn" onclick="pickMeal('저녁',this)"><span class="mbtn-icon">🌙</span><span class="mbtn-lbl">저녁</span></div>
    </div>
    <div class="mlist" id="mlist">
      <div class="mlist-ttl" id="mlistTtl">메뉴</div>
      <div id="mlistBody"></div>
    </div>
    <button class="home-btn" onclick="closeSheet()">← 처음으로</button>
  </div>
</div>

<!-- PASSWORD -->
<div class="ov center" id="pwOv" onclick="if(event.target===this)closePw()">
  <div class="pw-box">
    <div class="pw-lock">🔐</div>
    <div class="pw-title">관리자 인증</div>
    <div class="pw-sub">비밀번호 4자리를 입력하세요</div>
    <div class="pw-dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
    </div>
    <div class="pw-err" id="pwErr"></div>
    <div class="numpad">
      <button class="npbtn" onclick="np('1')">1</button>
      <button class="npbtn" onclick="np('2')">2</button>
      <button class="npbtn" onclick="np('3')">3</button>
      <button class="npbtn" onclick="np('4')">4</button>
      <button class="npbtn" onclick="np('5')">5</button>
      <button class="npbtn" onclick="np('6')">6</button>
      <button class="npbtn" onclick="np('7')">7</button>
      <button class="npbtn" onclick="np('8')">8</button>
      <button class="npbtn" onclick="np('9')">9</button>
      <button class="npbtn emp"></button>
      <button class="npbtn" onclick="np('0')">0</button>
      <button class="npbtn del" onclick="npDel()">⌫</button>
    </div>
    <button class="pw-cancel" onclick="closePw()">취소</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
  <div class="ap-inner">
    <div class="ap-head">
      <h2>⚙️ 관리자 패널</h2>
      <button class="ap-close" onclick="closeAdmin()">✕</button>
    </div>
    <div class="sec-lbl">📊 엑셀(xlsx) 메뉴 업로드</div>
    <div class="upload-box" onclick="document.getElementById('xlsxInput').click()">
      <div class="ub-icon">📊</div>
      <div class="ub-lbl">엑셀 파일을 선택하세요</div>
      <div class="ub-hint">.xlsx 형식 · 날짜/아침/점심/저녁 포함된 메뉴표</div>
    </div>
    <input type="file" id="xlsxInput" accept=".xlsx,.xls" onchange="onXlsx(event)"/>
    <input type="file" id="pdfInput" accept=".pdf" onchange="onPdf(event)" style="display:none"/>
    <div class="status-bar" id="statusBar"></div>
    <div class="sec-lbl" style="margin-top:6px">✏️ 텍스트 직접 편집</div>
    <div class="raw-hint">아래 형식으로 직접 입력하거나 엑셀 업로드 후 수정하세요.</div>
    <textarea class="raw-area" id="rawArea" placeholder="형식 예시:

2026-04-09
아침: 된장국, 밥, 김치, 달걀프라이
점심: 비빔밥, 미역국, 불고기, 깍두기
저녁: 삼겹살, 쌈채소, 된장찌개"></textarea>
    <button class="abtn pri" onclick="doSave()">💾 메뉴 저장하기</button>
    <button class="abtn sec" onclick="closeAdmin()">← 돌아가기</button>
    <button class="abtn dan" onclick="doReset()">🗑️ 전체 초기화</button>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ── 상태 ── */
var menuData={}, curDate=null, pwStr='';
var PW='0203';
var DAYS=['일','월','화','수','목','금','토'];

/* ── 이모지 ── */
var EM=[
  ['볶음밥','🍳'],['비빔밥','🥘'],['덮밥','🍚'],['밥','🍚'],
  ['된장찌개','🥘'],['김치찌개','🥘'],['찌개','🥘'],
  ['탕','🍲'],['국','🍲'],['죽','🥣'],['스프','🥣'],
  ['김치','🌶️'],['깍두기','🌶️'],['열무','🌿'],['배추','🥬'],
  ['삼겹살','🥓'],['불고기','🥩'],['갈비','🍖'],['고기','🥩'],
  ['고등어','🐟'],['연어','🐟'],['갈치','🐟'],['생선','🐟'],
  ['새우','🍤'],['오징어','🦑'],
  ['두부','🟫'],['계란','🥚'],['달걀','🥚'],

  ['빵','🍞'],['토스트','🍞'],['샌드위치','🥪'],

/* ── 파싱 ── */
function parseTxt(text){
  var res={};
  var lines=text.split(/\r?\n/);
  var cur=null;
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line)continue;
    var d=findDate(line);
    if(d){cur=d;if(!res[cur])res[cur]={};continue;}
    if(!cur)continue;
    var meal=findMeal(line);
    if(meal){
      var rest=line.replace(/^(아침|조식|점심|중식|저녁|석식)/,'').replace(/^[\s:：]+/,'');
      if(!res[cur][meal])res[cur][meal]=[];
      var items=splitItems(rest);
      for(var j=0;j<items.length;j++)res[cur][meal].push(items[j]);
    }
  }
  return res;
}
function findDate(s){
  var m,yr=new Date().getFullYear();
  m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return m[1]+'-'+m[2]+'-'+m[3];
  m=s.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);if(m)return m[1]+'-'+pad(+m[2])+'-'+pad(+m[3]);
  m=s.match(/(\d{2})년\s*(\d{1,2})월\s*(\d{1,2})일/);if(m)return '20'+m[1]+'-'+pad(+m[2])+'-'+pad(+m[3]);
  m=s.match(/(\d{1,2})월\s*(\d{1,2})일/);if(m)return yr+'-'+pad(+m[1])+'-'+pad(+m[2]);
  m=s.match(/^(\d{1,2})\/(\d{1,2})$/);if(m&&+m[1]<=12&&+m[2]<=31)return yr+'-'+pad(+m[1])+'-'+pad(+m[2]);
  return null;
}
function findMeal(s){
  if(/^(아침|조식)/.test(s))return'아침';
  if(/^(점심|중식)/.test(s))return'점심';
  if(/^(저녁|석식)/.test(s))return'저녁';
  return null;
}
function splitItems(s){
  if(!s.trim())return[];
  if(s.indexOf(',')>=0||s.indexOf('，')>=0){
    return s.split(/[,，]+/).map(function(x){return x.trim();}).filter(function(x){return x.length>0;});
  }
  return s.split(/\s+/).map(function(x){return x.trim();}).filter(function(x){return x.length>=2;});
}

/* ── XLSX ── */
/* Excel 날짜 시리얼 → Date */
function xlSerialToDate(n){
  if(typeof n!=='number'||n<1)return null;
  var d=new Date(Math.round((n-25569)*86400*1000));
  if(isNaN(d.getTime()))return null;
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}

function findDateXl(cell){
  if(cell instanceof Date){
    return cell.getFullYear()+'-'+pad(cell.getMonth()+1)+'-'+pad(cell.getDate());
  }
  var n=+cell;
  if(!isNaN(n)&&n>40000&&n<60000)return xlSerialToDate(n);
  var s=String(cell||'').trim();
  var d=findDate(s);
  if(d)return d;
  // "4/1(월)" "4.1" "04-01" 등 추가 패턴
  var yr=new Date().getFullYear();
  var m;
  m=s.match(/(\d{1,2})[\/\.](\d{1,2})/);
  if(m&&+m[1]>=1&&+m[1]<=12&&+m[2]>=1&&+m[2]<=31)return yr+'-'+pad(+m[1])+'-'+pad(+m[2]);
  return null;
}

function onXlsx(e){
  var file=e.target.files[0];if(!file)return;
  setStatus('<span class="spin"></span> 엑셀 읽는 중…','info');
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var wb=XLSX.read(ev.target.result,{type:'array',cellDates:true,raw:false});
      var res={};
      var rawLines=[];
      for(var si=0;si<wb.SheetNames.length;si++){
        var ws=wb.Sheets[wb.SheetNames[si]];
        // raw rows (with Date objects)
        var rowsRaw=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true,dateNF:'yyyy-mm-dd'});
        // formatted rows (text)
        var rowsFmt=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
        parseXlsxRows(rowsRaw,rowsFmt,res,rawLines);
      }
      var cnt=Object.keys(res).length;
      // 결과 텍스트 항상 textarea에 표시
      if(rawLines.length)document.getElementById('rawArea').value=rawLines.join('\n');
      if(!cnt){
        setStatus('⚠️ 자동 파싱 실패 — 아래 텍스트를 확인 후 저장하세요.','err');
        return;
      }
      for(var k in res)menuData[k]=res[k];
      saveData();render();renderPreview(res);
      setStatus('✅ 엑셀 로드 완료 ('+cnt+'일치 저장)','ok');
    }catch(err){
      setStatus('❌ 엑셀 오류: '+err.message,'err');
    }
    e.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

function parseXlsxRows(rowsRaw,rowsFmt,res,rawLines){
  // 날짜 행 탐색 (날짜가 2개 이상 있는 행)
  var dateRowIdx=-1, dateCols={}, mealCol=0;
  for(var r=0;r<rowsFmt.length;r++){
    var row=rowsFmt[r]; var found=0; var tmp={};
    for(var c=0;c<row.length;c++){
      var d=findDateXl(rowsRaw[r]?rowsRaw[r][c]:'')||findDateXl(row[c]);
      if(d){tmp[c]=d;found++;}
    }
    if(found>=2){
      dateRowIdx=r; dateCols=tmp;
      // 날짜 열 직전 열이 식사 구분 열
      var minCol=Math.min.apply(null,Object.keys(tmp).map(Number));
      mealCol=Math.max(0,minCol-1);
      break;
    }
  }

  if(dateRowIdx>=0){
    // 표 형식 파싱: 식사 구분은 mealCol, 날짜별 메뉴는 dateCols
    var curMeal=null;
    for(var r2=dateRowIdx+1;r2<rowsFmt.length;r2++){
      var row2=rowsFmt[r2];
      var mealCell=String(row2[mealCol]||'').trim();
      if(/조식|아침/.test(mealCell))curMeal='아침';
      else if(/중식|점심/.test(mealCell))curMeal='점심';
      else if(/석식|저녁/.test(mealCell))curMeal='저녁';
      if(!curMeal)continue;
      for(var c2 in dateCols){
        var dt2=dateCols[c2];
        var cell2=String(row2[c2]||'').trim();
        if(!cell2)continue;
        if(!res[dt2])res[dt2]={};
        if(!res[dt2][curMeal])res[dt2][curMeal]=[];
        // 셀 안의 아이템 파싱 (슬래시는 선택지로 유지, 쉼표/줄바꿈으로 분리)
        var its=cell2.split(/[,\n]+/).map(function(x){return x.trim();}).filter(function(x){return x.length>=1;});
        for(var j=0;j<its.length;j++)res[dt2][curMeal].push(its[j]);
      }
    }
    // rawLines 생성
    var dates2=Object.keys(res).sort();
    for(var di=0;di<dates2.length;di++){
      rawLines.push(dates2[di]);
      var ms=['아침','점심','저녁'];
      for(var mi=0;mi<ms.length;mi++){
        var its2=(res[dates2[di]][ms[mi]]||[]);
        if(its2.length)rawLines.push(ms[mi]+': '+its2.join(', '));
      }
      rawLines.push('');
    }
    return;
  }

  // 세로 형식 fallback
  var cur=null;
  for(var r3=0;r3<rowsFmt.length;r3++){
    var line=rowsFmt[r3].map(function(x){return String(x||'').trim();}).filter(function(x){return x;}).join(' ');
    rawLines.push(line);
    if(!line)continue;
    var d2=findDateXl(line)||findDate(line);
    if(d2){cur=d2;if(!res[cur])res[cur]={};continue;}
    if(!cur)continue;
    var meal2=findMeal(line);
    if(meal2){
      var rest=line.replace(/^(아침|조식|점심|중식|저녁|석식)/,'').replace(/^[\s:：]+/,'');
      if(!res[cur][meal2])res[cur][meal2]=[];
      var its3=splitItems(rest);
      for(var j3=0;j3<its3.length;j3++)if(its3[j3])res[cur][meal2].push(its3[j3]);
    }
  }
}

/* ── PDF ── */
async function onPdf(e){
  var file=e.target.files[0];if(!file)return;
  setStatus('<span class="spin"></span> PDF 읽는 중…','info');
  try{
    var buf=await file.arrayBuffer();
    var pdf=await pdfjsLib.getDocument(buf).promise;
    var lines=[];
    for(var p=1;p<=pdf.numPages;p++){
      var pg=await pdf.getPage(p);
      var tc=await pg.getTextContent();
      var items=[];
      for(var i=0;i<tc.items.length;i++){
        var it=tc.items[i];
        if(it.str.trim())items.push({t:it.str,x:Math.round(it.transform[4]),y:Math.round(it.transform[5])});
      }
      if(!items.length)continue;
      items.sort(function(a,b){return b.y!==a.y?b.y-a.y:a.x-b.x;});
      var row=[items[0]];
      for(var i=1;i<items.length;i++){
        if(Math.abs(items[i].y-row[0].y)<=6)row.push(items[i]);
        else{row.sort(function(a,b){return a.x-b.x;});lines.push(row.map(function(x){return x.t;}).join('\t'));row=[items[i]];}
      }
      row.sort(function(a,b){return a.x-b.x;});lines.push(row.map(function(x){return x.t;}).join('\t'));
    }
    var raw=lines.join('\n').trim();
    document.getElementById('rawArea').value=raw;
    var cnt=Object.keys(parseTxt(raw)).length;
    setStatus('✅ PDF 로드 완료 ('+pdf.numPages+'페이지'+(cnt?', '+cnt+'일치 감지':'')+')','ok');
  }catch(err){
    setStatus('❌ PDF 오류: '+err.message,'err');
  }
  e.target.value='';
}

    var meal=h<10?'아침':h<15?'점심':'저녁';
    setTimeout(function(){
      var btns=document.querySelectorAll('.mbtn');
      for(var i=0;i<btns.length;i++){
        if(btns[i].querySelector('.mbtn-lbl').textContent===meal){
          pickMeal(meal,btns[i]);break;
        }
      }
    },400);
  }
  setTimeout(openToday,800);
})();
</script>
</body>
</html>
